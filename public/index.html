<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naver Blog Scraper</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="app-shell">
    <section class="search-panel" aria-labelledby="page-title">
        <div class="brand-row">
            <div class="brand-mark" aria-hidden="true">N</div>
            <div>
                <h1 id="page-title">Naver Blog Scraper</h1>
                <p>검색어를 입력하고 조회하면 최신 블로그 검색 결과를 가져옵니다.</p>
            </div>
        </div>

        <form id="search-form" class="search-form">
            <label for="keyword">키워드</label>
            <div class="search-row">
                <input id="keyword" name="keyword" type="search" placeholder="예: 제주도 여행" autocomplete="off" required>
                <button id="search-button" type="submit">조회</button>
            </div>
        </form>
    </section>

    <section class="result-panel" aria-live="polite">
        <div class="result-header">
            <h2>조회 결과</h2>
            <span id="result-count">0건</span>
        </div>
        <p id="status-message" class="status-message">키워드를 입력한 뒤 조회 버튼을 눌러주세요.</p>
        <div id="result-list" class="result-list"></div>
    </section>
</main>
<script src="/app.js"></script>
</body>
</html>
